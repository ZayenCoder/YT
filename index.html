<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔥 Limited Offer · Click Tracker</title>
    <!-- Fast, professional, no heavy frameworks -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px 16px;
            color: #1a1e2b;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            max-width: 820px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.08), 0 8px 18px -6px rgba(0, 0, 0, 0.05);
            padding: 32px 28px;
            transition: box-shadow 0.2s ease;
            border: 1px solid #f0f2f6;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            background: linear-gradient(145deg, #b45389, #7f1146);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }

        .subhead {
            font-size: 1.1rem;
            color: #4a5060;
            margin-bottom: 32px;
            border-left: 4px solid #c12872;
            padding-left: 18px;
            font-weight: 400;
        }

        /* stats panel — professional dashboard style */
        .stats-panel {
            background: #f8faff;
            border-radius: 22px;
            padding: 22px 24px;
            margin-bottom: 36px;
            border: 1px solid #e9ecf5;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
        }

        .total-clicks-box {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }

        .total-label {
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            font-size: 0.9rem;
            color: #5b677b;
        }

        .total-number {
            font-size: 3.5rem;
            font-weight: 700;
            color: #1e2532;
            line-height: 1;
            background: #ffffff;
            padding: 4px 18px;
            border-radius: 60px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02), 0 2px 4px rgba(0,0,0,0.02);
            border: 1px solid #dfe3ec;
        }

        .breakdown {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .breakdown-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .badge {
            background: #e6e9f0;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #2c3547;
        }

        .badge span {
            font-weight: 700;
            margin-left: 6px;
            color: #a1105e;
        }

        /* last click info — ultra clear */
        .last-click-area {
            background: #ffffff;
            border-radius: 18px;
            padding: 14px 20px;
            margin-bottom: 32px;
            border: 1px dashed #cbd0db;
            color: #2e384d;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .last-click-label {
            font-weight: 600;
            background: #1e2532;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
        }

        .last-click-value {
            font-weight: 500;
            word-break: break-word;
        }

        /* button grid */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin-top: 12px;
        }

        .offer-btn {
            background: #ffffff;
            border: 1.5px solid #d9dde6;
            border-radius: 28px;
            padding: 20px 12px;
            font-weight: 600;
            font-size: 1.3rem;
            color: #1f2636;
            box-shadow: 0 6px 10px -4px rgba(0, 0, 0, 0.02);
            transition: all 0.15s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(4px);
            background: rgba(255,255,255,0.9);
        }

        .offer-btn:hover {
            background: #c12872;
            border-color: #c12872;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 18px 25px -10px rgba(193, 40, 114, 0.25);
        }

        .offer-btn:active {
            transform: translateY(2px);
            box-shadow: 0 6px 12px -6px rgba(193, 40, 114, 0.3);
        }

        .offer-emoji {
            font-size: 2.1rem;
            margin-bottom: 6px;
        }

        .btn-sub {
            font-size: 0.8rem;
            opacity: 0.75;
            margin-top: 6px;
            font-weight: 400;
        }

        .offer-btn:hover .btn-sub {
            opacity: 1;
        }

        .footer-note {
            margin-top: 28px;
            text-align: center;
            font-size: 0.85rem;
            color: #7c8599;
        }

        .reset-area {
            display: flex;
            justify-content: flex-end;
            margin-top: 16px;
        }

        .reset-btn {
            background: none;
            border: 1px solid #cfd5e2;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.1s;
        }

        .reset-btn:hover {
            background: #f0f2f8;
            border-color: #b0b8ca;
        }

        /* mobile */
        @media (max-width: 600px) {
            .card { padding: 22px 16px; }
            h1 { font-size: 2rem; }
            .button-grid { grid-template-columns: 1fr; gap: 12px; }
            .stats-panel { flex-direction: column; gap: 16px; }
            .total-number { font-size: 2.8rem; }
            .breakdown { gap: 16px; }
        }

        /* performance: no layout shift */
        .click-flash {
            transition: background 0.08s;
        }
        .highlight-flash {
            background: #fcedf3 !important;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🔥 Limited Offer</h1>
    <div class="subhead">fast · professional · instant tracking</div>

    <!-- STATS: total clicks + per button -->
    <div class="stats-panel">
        <div class="total-clicks-box">
            <span class="total-label">Total clicks</span>
            <span class="total-number" id="totalClicksDisplay">0</span>
        </div>
        <div class="breakdown">
            <div class="breakdown-item">
                <span class="badge">🎁 Offer 1 <span id="countOffer1">0</span></span>
            </div>
            <div class="breakdown-item">
                <span class="badge">🚀 Offer 2 <span id="countOffer2">0</span></span>
            </div>
            <div class="breakdown-item">
                <span class="badge">⭐ Offer 3 <span id="countOffer3">0</span></span>
            </div>
        </div>
    </div>

    <!-- Last click info — kon click kora hoyeche seta dekhabe -->
    <div class="last-click-area" id="lastClickPanel">
        <span class="last-click-label">LAST CLICK</span>
        <span class="last-click-value" id="lastClickMessage">— no click yet —</span>
    </div>

    <!-- BUTTONS: 3 professional CTA -->
    <div class="button-grid">
        <!-- Offer 1 -->
        <button class="offer-btn" id="btnOffer1" data-offer="Offer 1">
            <span class="offer-emoji">🎁</span>
            <span>Claim Offer 1</span>
            <span class="btn-sub">exclusive deal</span>
        </button>
        <!-- Offer 2 -->
        <button class="offer-btn" id="btnOffer2" data-offer="Offer 2">
            <span class="offer-emoji">🚀</span>
            <span>Unlock Offer 2</span>
            <span class="btn-sub">instant access</span>
        </button>
        <!-- Offer 3 -->
        <button class="offer-btn" id="btnOffer3" data-offer="Offer 3">
            <span class="offer-emoji">⭐</span>
            <span>Get Offer 3</span>
            <span class="btn-sub">limited time</span>
        </button>
    </div>

    <div class="reset-area">
        <button class="reset-btn" id="resetStatsBtn" aria-label="reset counters">↻ reset stats</button>
    </div>
    <div class="footer-note">
        ⚡ every click counted · live update · professional lightweight tracker
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ---------- fast, professional click tracker ----------
        // DOM elements
        const totalSpan = document.getElementById('totalClicksDisplay');
        const count1Span = document.getElementById('countOffer1');
        const count2Span = document.getElementById('countOffer2');
        const count3Span = document.getElementById('countOffer3');
        const lastClickMsg = document.getElementById('lastClickMessage');

        // Buttons
        const btn1 = document.getElementById('btnOffer1');
        const btn2 = document.getElementById('btnOffer2');
        const btn3 = document.getElementById('btnOffer3');
        const resetBtn = document.getElementById('resetStatsBtn');

        // State — initialize from localStorage (so refresh e data persist kore, professional touch)
        let clicks = {
            offer1: 0,
            offer2: 0,
            offer3: 0
        };

        let lastClickInfo = {
            offerName: null,
            timestamp: null
        };

        // Load saved data (if any)
        function loadFromStorage() {
            try {
                const saved = localStorage.getItem('professional_click_tracker_v1');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed && typeof parsed === 'object') {
                        clicks.offer1 = Number(parsed.offer1) || 0;
                        clicks.offer2 = Number(parsed.offer2) || 0;
                        clicks.offer3 = Number(parsed.offer3) || 0;
                    }
                }
                const savedLast = localStorage.getItem('pro_last_click_v1');
                if (savedLast) {
                    const lastParsed = JSON.parse(savedLast);
                    if (lastParsed) {
                        lastClickInfo.offerName = lastParsed.offerName || null;
                        lastClickInfo.timestamp = lastParsed.timestamp || null;
                    }
                }
            } catch (e) {
                // if storage corrupt, ignore and start fresh
                console.warn("Storage read error, using fresh state.");
            }
        }

        // Save to localStorage (fast, non-blocking)
        function persistState() {
            try {
                localStorage.setItem('professional_click_tracker_v1', JSON.stringify(clicks));
                localStorage.setItem('pro_last_click_v1', JSON.stringify({
                    offerName: lastClickInfo.offerName,
                    timestamp: lastClickInfo.timestamp
                }));
            } catch (e) {}
        }

        // total count
        function getTotal() {
            return clicks.offer1 + clicks.offer2 + clicks.offer3;
        }

        // Update all UI
        function updateUI() {
            totalSpan.textContent = getTotal();
            count1Span.textContent = clicks.offer1;
            count2Span.textContent = clicks.offer2;
            count3Span.textContent = clicks.offer3;

            // Update last click message
            if (lastClickInfo.offerName && lastClickInfo.timestamp) {
                const timeStr = new Date(lastClickInfo.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                lastClickMsg.textContent = `✅ ${lastClickInfo.offerName} · ${timeStr}`;
            } else {
                lastClickMsg.textContent = '— no click yet —';
            }
        }

        // Flash effect for feedback (fast, subtle)
        function flashElement(el) {
            if (!el) return;
            el.classList.add('highlight-flash');
            setTimeout(() => {
                el.classList.remove('highlight-flash');
            }, 120);
        }

        // Core click handler: kon click kora holo, count barbe, UI update
        function handleOfferClick(offerKey, offerDisplayName, buttonElement) {
            // increment counter
            clicks[offerKey] += 1;

            // last click info set
            lastClickInfo.offerName = offerDisplayName;
            lastClickInfo.timestamp = Date.now();

            // persist to localStorage (professional, reload e data thake)
            persistState();

            // update UI numbers
            updateUI();

            // flash total & last click panel & button for instant feedback
            flashElement(totalSpan);
            flashElement(lastClickMsg);
            if (buttonElement) flashElement(buttonElement);
        }

        // Reset all counts
        function resetAllStats() {
            clicks.offer1 = 0;
            clicks.offer2 = 0;
            clicks.offer3 = 0;
            lastClickInfo.offerName = null;
            lastClickInfo.timestamp = null;

            persistState();
            updateUI();

            // subtle feedback
            flashElement(totalSpan);
            flashElement(lastClickMsg);
        }

        // Attach event listeners (lick click pase count hobe)
        function bindEvents() {
            btn1.addEventListener('click', function(e) {
                e.preventDefault();  // no navigation, just tracking
                handleOfferClick('offer1', '🎁 Offer 1', btn1);
            });

            btn2.addEventListener('click', function(e) {
                e.preventDefault();
                handleOfferClick('offer2', '🚀 Offer 2', btn2);
            });

            btn3.addEventListener('click', function(e) {
                e.preventDefault();
                handleOfferClick('offer3', '⭐ Offer 3', btn3);
            });

            resetBtn.addEventListener('click', function(e) {
                e.preventDefault();
                resetAllStats();
            });
        }

        // Initialize
        function init() {
            loadFromStorage();
            updateUI();
            bindEvents();
        }

        // Start
        init();

        // Optional: expose for debugging (professional)
        window.__clickTracker = {
            getState: () => ({ clicks, lastClick: lastClickInfo, total: getTotal() }),
            reset: resetAllStats
        };

    })();
</script>

<!-- subtle style for flash (kept in style, but also add class) -->
<style>
    .offer-btn, .total-number, .last-click-value, .badge span {
        transition: background-color 0.12s, transform 0.1s, box-shadow 0.2s;
    }
    .highlight-flash {
        background-color: #fbe4ee !important;
        transition: background-color 0.05s;
    }
    .total-number.highlight-flash {
        background-color: #f8d5e4 !important;
    }
    button {
        user-select: none;
    }
</style>
</body>
</html>
